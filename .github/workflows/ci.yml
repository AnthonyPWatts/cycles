name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, test, and smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Cycles.slnx --configfile NuGet.Config

      - name: Build
        run: dotnet build Cycles.slnx --configuration Debug --no-restore

      - name: Test
        shell: pwsh
        run: ./eng/test.ps1

      - name: CLI smoke check
        shell: pwsh
        run: |
          $statePath = Join-Path $env:RUNNER_TEMP "cycles-ci-state.json"
          dotnet run --no-build --project src/Cycles.Cli -- seed $statePath 8 2 90210
          dotnet run --no-build --project src/Cycles.Cli -- tick $statePath
          dotnet run --no-build --project src/Cycles.Cli -- show $statePath

      - name: Alpha gameplay smoke check
        shell: pwsh
        run: ./eng/alpha-gameplay-smoke.ps1 -NoBuild -StatePath (Join-Path $env:RUNNER_TEMP "cycles-ci-alpha-state.json")

  sql-server-integration:
    name: SQL Server integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong!Passw0rd
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U SA -P 'YourStrong!Passw0rd' -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-start-period 30s
          --health-retries 12

    env:
      CYCLES_SQL_INTEGRATION_CONNECTION_STRING: Server=localhost,1433;Database=CyclesDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;Encrypt=False;Connect Timeout=10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Cycles.slnx --configfile NuGet.Config

      - name: Apply database migrations
        shell: pwsh
        run: dotnet run --no-restore --project src/Cycles.Cli -- db migrate "sqlserver:$env:CYCLES_SQL_INTEGRATION_CONNECTION_STRING"

      - name: Test with SQL Server
        shell: pwsh
        run: ./eng/test.ps1
