name: Deploy playground

on:
  workflow_dispatch:
    inputs:
      database_maintenance:
        description: Allow this deployment to migrate or otherwise update the deployed SQL database
        required: true
        default: false
        type: boolean
      reseed:
        description: Replace the disposable Development state with the canonical opening
        required: true
        default: false
        type: boolean
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read
  id-token: write

concurrency:
  group: playground-deployment
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy trusted playground
    if: >-
      vars.AZURE_WEBAPP_DEPLOY_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    environment: playground

    steps:
      - name: Resolve revision
        id: revision
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.revision.outputs.sha }}

      - name: Verify required edge assets
        shell: bash
        run: |
          for edge_asset_path in \
            src/Cycles.Api/wwwroot/assets/icons/*.svg \
            src/Cycles.Api/wwwroot/assets/galaxy/twin-reaches-*.webp; do
            relative_asset_path="${edge_asset_path#src/Cycles.Api/wwwroot/}"
            edge_asset_url="https://cycles.anthonypwatts.co.uk/${relative_asset_path}"
            status_code="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "$edge_asset_url" || true)"
            if [ "$status_code" != "200" ]; then
              echo "::error::Required edge asset ${edge_asset_url} returned HTTP ${status_code}. Deploy deploy/cloudflare before this Azure revision."
              exit 1
            fi
          done

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore API
        run: dotnet restore src/Cycles.Api/Cycles.Api.csproj --configfile NuGet.Config

      - name: Restore operator CLI
        run: dotnet restore src/Cycles.Cli/Cycles.Cli.csproj --configfile NuGet.Config

      - name: Publish API
        run: dotnet publish src/Cycles.Api/Cycles.Api.csproj --configuration Release --no-restore --output publish

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Reject reseed without database maintenance
        if: github.event_name == 'workflow_dispatch' && inputs.reseed && !inputs.database_maintenance
        shell: bash
        run: |
          echo "::error::Reseeding requires database_maintenance to be enabled explicitly."
          exit 1

      - name: Stop API for database maintenance
        if: github.event_name == 'workflow_dispatch' && inputs.database_maintenance
        run: >-
          az webapp stop
          --resource-group rg-cycles-playground-uks
          --name "${{ vars.AZURE_WEBAPP_NAME }}"

      - name: Configure edge asset redirect
        run: >-
          az webapp config appsettings set
          --resource-group rg-cycles-playground-uks
          --name "${{ vars.AZURE_WEBAPP_NAME }}"
          --settings
          ASPNETCORE_ENVIRONMENT=${{ vars.PLAYGROUND_HOST_ENVIRONMENT || 'Development' }}
          Cycles__EdgeAssetOrigin=https://cycles.anthonypwatts.co.uk
          Cycles__Authentication__Mode=${{ vars.PLAYGROUND_AUTHENTICATION_MODE || 'DevelopmentSelector' }}
          Cycles__Features__GamesAccountShell__Enabled=true
          Cycles__Features__TrainingGames__Enabled=true
          Cycles__Features__TrainingGames__PilotPlayerIds__0=2bbf6b63-b50f-4fe3-bc11-913c2b74aa01
          --output none

      - name: Migrate and prepare galaxy
        if: github.event_name == 'workflow_dispatch' && inputs.database_maintenance
        shell: bash
        run: |
          connection_string="$(az webapp config connection-string list \
            --resource-group rg-cycles-playground-uks \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --query "[?name=='Cycles'].value | [0]" \
            --output tsv)"
          if [ -z "$connection_string" ]; then
            echo "The Cycles connection string is not configured." >&2
            exit 1
          fi
          echo "::add-mask::$connection_string"
          for attempt in 1 2 3; do
            if dotnet run --no-restore --project src/Cycles.Cli --configuration Release -- \
              db migrate "sqlserver:$connection_string"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Database migration connection attempt $attempt failed; waiting for serverless SQL to wake."
            sleep $((attempt * 15))
          done
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.reseed }}" = "true" ]; then
            dotnet run --no-restore --project src/Cycles.Cli --configuration Release -- \
              seed "sqlserver:$connection_string" --confirm-replace
            dotnet run --no-restore --project src/Cycles.Cli --configuration Release -- \
              show "sqlserver:$connection_string"
          else
            dotnet run --no-restore --project src/Cycles.Cli --configuration Release -- \
              galaxy upgrade "sqlserver:$connection_string" --confirm-upgrade
          fi

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: publish

      - name: Start API
        if: always()
        run: >-
          az webapp start
          --resource-group rg-cycles-playground-uks
          --name "${{ vars.AZURE_WEBAPP_NAME }}"

      - name: Verify health
        shell: bash
        run: |
          health_url="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          for attempt in {1..12}; do
            status_code="$(curl --silent --show-error --output health-response.txt --write-out '%{http_code}' "$health_url" || true)"
            if [ "$status_code" = "200" ]; then
              cat health-response.txt
              exit 0
            fi
            if [ "$status_code" = "403" ]; then
              app_state="$(az webapp show \
                --resource-group rg-cycles-playground-uks \
                --name "${{ vars.AZURE_WEBAPP_NAME }}" \
                --query state \
                --output tsv)"
              if [ "$app_state" = "QuotaExceeded" ]; then
                plan_id="$(az webapp show \
                  --resource-group rg-cycles-playground-uks \
                  --name "${{ vars.AZURE_WEBAPP_NAME }}" \
                  --query serverFarmId \
                  --output tsv)"
                echo "::error::Azure stopped the playground because an App Service F1 quota was exceeded."
                az rest \
                  --method get \
                  --url "${plan_id}/usages?api-version=2022-03-01" \
                  --query "value[?limit >= \`0\` && currentValue > limit].{quota:name.localizedValue,current:currentValue,limit:limit,unit:unit,nextResetTime:nextResetTime}" \
                  --output table
                exit 1
              fi
            fi
            echo "Health attempt ${attempt} returned HTTP ${status_code}."
            sleep 10
          done
          exit 1
