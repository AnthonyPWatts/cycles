name: Deploy playground

on:
  workflow_dispatch:
    inputs:
      database_action:
        description: Production SQL action to run before publishing the API
        required: true
        default: none
        type: choice
        options:
          - none
          - migrate
          - migrate-and-upgrade
          - reseed
      override_sql_budget:
        description: Allow the SQL action when the free-allowance guard fails; paid usage may result
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: playground-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy trusted playground
    if: >-
      vars.AZURE_WEBAPP_DEPLOY_ENABLED == 'true' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: playground
    env:
      SQL_FREE_MONTHLY_VCORE_SECONDS: "100000"
      SQL_ENGINEERING_BUDGET_VCORE_SECONDS: "75000"
      SQL_PLAY_RESERVE_VCORE_SECONDS: "25000"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify required edge assets
        shell: bash
        run: |
          for edge_asset_path in \
            src/Cycles.Api/wwwroot/assets/icons/*.svg \
            src/Cycles.Api/wwwroot/assets/galaxy/twin-reaches-*.webp; do
            relative_asset_path="${edge_asset_path#src/Cycles.Api/wwwroot/}"
            edge_asset_url="https://cycles.anthonypwatts.co.uk/${relative_asset_path}"
            status_code="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "$edge_asset_url" || true)"
            if [ "$status_code" != "200" ]; then
              echo "::error::Required edge asset ${edge_asset_url} returned HTTP ${status_code}. Deploy deploy/cloudflare before this Azure revision."
              exit 1
            fi
          done

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore API
        run: dotnet restore src/Cycles.Api/Cycles.Api.csproj --configfile NuGet.Config

      - name: Restore operator CLI
        if: inputs.database_action != 'none'
        run: dotnet restore src/Cycles.Cli/Cycles.Cli.csproj --configfile NuGet.Config

      - name: Publish API
        run: dotnet publish src/Cycles.Api/Cycles.Api.csproj --configuration Release --no-restore --output publish

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Check SQL allowance budget
        if: inputs.database_action != 'none'
        shell: bash
        run: |
          database_id="$(az sql db show \
            --resource-group rg-cycles-playground-uks \
            --server cycles-sql-b366b760 \
            --name CyclesDb \
            --query id \
            --output tsv)"
          exhaustion_behavior="$(az sql db show \
            --ids "$database_id" \
            --query freeLimitExhaustionBehavior \
            --output tsv)"
          month_start="$(date -u +%Y-%m-01T00:00:00Z)"
          now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          remaining="$(az monitor metrics list \
            --resource "$database_id" \
            --metric free_amount_remaining \
            --start-time "$month_start" \
            --end-time "$now" \
            --interval PT1H \
            --aggregation Minimum \
            --query "value[0].timeseries[0].data[?minimum != null].minimum | [-1]" \
            --output tsv)"

          if ! [[ "$remaining" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
            echo "::error::Azure did not return the current SQL free-allowance balance."
            exit 1
          fi

          remaining_seconds="$(printf '%.0f' "$remaining")"
          consumed_seconds=$((SQL_FREE_MONTHLY_VCORE_SECONDS - remaining_seconds))
          if [ "$consumed_seconds" -lt 0 ]; then
            consumed_seconds=0
          fi
          day_of_month=$((10#$(date -u +%d)))
          days_in_month=$((10#$(date -u -d "$(date -u +%Y-%m-01) +1 month -1 day" +%d)))
          paced_limit=$((SQL_ENGINEERING_BUDGET_VCORE_SECONDS * day_of_month / days_in_month))
          budget_failure=false

          if [ "$remaining_seconds" -lt "$SQL_PLAY_RESERVE_VCORE_SECONDS" ]; then
            echo "::error::SQL free allowance has ${remaining_seconds} vCore-seconds remaining; the play reserve is ${SQL_PLAY_RESERVE_VCORE_SECONDS}."
            budget_failure=true
          fi
          if [ "$consumed_seconds" -gt "$paced_limit" ]; then
            echo "::error::SQL free allowance consumption is ${consumed_seconds} vCore-seconds; the day-${day_of_month} engineering pace is ${paced_limit}."
            budget_failure=true
          fi

          {
            echo "### Azure SQL allowance preflight"
            echo ""
            echo "- Exhaustion behaviour: ${exhaustion_behavior}"
            echo "- Free amount remaining: ${remaining_seconds} vCore-seconds"
            echo "- Free amount consumed: ${consumed_seconds} vCore-seconds"
            echo "- Engineering pace through day ${day_of_month}: ${paced_limit} vCore-seconds"
            echo "- Play reserve: ${SQL_PLAY_RESERVE_VCORE_SECONDS} vCore-seconds"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$budget_failure" = "true" ]; then
            if [ "${{ inputs.override_sql_budget }}" != "true" ]; then
              echo "::error::SQL maintenance is blocked. Re-dispatch with override_sql_budget only after accepting the paid-usage risk."
              exit 1
            fi
            echo "::warning::SQL allowance guard overridden for this dispatch; ${exhaustion_behavior} can incur paid usage."
          fi

      - name: Stop API for database maintenance
        if: inputs.database_action != 'none'
        run: >-
          az webapp stop
          --resource-group rg-cycles-playground-uks
          --name "${{ vars.AZURE_WEBAPP_NAME }}"

      - name: Configure edge asset redirect
        run: >-
          az webapp config appsettings set
          --resource-group rg-cycles-playground-uks
          --name "${{ vars.AZURE_WEBAPP_NAME }}"
          --settings
          ASPNETCORE_ENVIRONMENT=${{ vars.PLAYGROUND_HOST_ENVIRONMENT || 'Development' }}
          Cycles__EdgeAssetOrigin=https://cycles.anthonypwatts.co.uk
          Cycles__Authentication__Mode=${{ vars.PLAYGROUND_AUTHENTICATION_MODE || 'DevelopmentSelector' }}
          Cycles__Features__GamesAccountShell__Enabled=true
          Cycles__Features__TrainingGames__Enabled=true
          Cycles__Features__TrainingGames__PilotPlayerIds__0=2bbf6b63-b50f-4fe3-bc11-913c2b74aa01
          --output none

      - name: Run explicit database maintenance
        if: inputs.database_action != 'none'
        shell: bash
        run: |
          connection_string="$(az webapp config connection-string list \
            --resource-group rg-cycles-playground-uks \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --query "[?name=='Cycles'].value | [0]" \
            --output tsv)"
          if [ -z "$connection_string" ]; then
            echo "The Cycles connection string is not configured." >&2
            exit 1
          fi
          echo "::add-mask::$connection_string"
          for attempt in 1 2 3; do
            if dotnet run --no-restore --project src/Cycles.Cli --configuration Release -- \
              db migrate "sqlserver:$connection_string"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Database migration connection attempt $attempt failed; waiting for serverless SQL to wake."
            sleep $((attempt * 15))
          done
          case "${{ inputs.database_action }}" in
            migrate)
              ;;
            migrate-and-upgrade)
              dotnet run --no-restore --project src/Cycles.Cli --configuration Release -- \
                galaxy upgrade "sqlserver:$connection_string" --confirm-upgrade
              ;;
            reseed)
              dotnet run --no-restore --project src/Cycles.Cli --configuration Release -- \
                seed "sqlserver:$connection_string" --confirm-replace
              dotnet run --no-restore --project src/Cycles.Cli --configuration Release -- \
                show "sqlserver:$connection_string"
              ;;
            *)
              echo "::error::Unsupported database action '${{ inputs.database_action }}'."
              exit 1
              ;;
          esac

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: publish

      - name: Start API
        if: always()
        run: >-
          az webapp start
          --resource-group rg-cycles-playground-uks
          --name "${{ vars.AZURE_WEBAPP_NAME }}"

      - name: Verify health
        shell: bash
        run: |
          health_url="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          for attempt in {1..12}; do
            status_code="$(curl --silent --show-error --output health-response.txt --write-out '%{http_code}' "$health_url" || true)"
            if [ "$status_code" = "200" ]; then
              cat health-response.txt
              exit 0
            fi
            if [ "$status_code" = "403" ]; then
              app_state="$(az webapp show \
                --resource-group rg-cycles-playground-uks \
                --name "${{ vars.AZURE_WEBAPP_NAME }}" \
                --query state \
                --output tsv)"
              if [ "$app_state" = "QuotaExceeded" ]; then
                plan_id="$(az webapp show \
                  --resource-group rg-cycles-playground-uks \
                  --name "${{ vars.AZURE_WEBAPP_NAME }}" \
                  --query serverFarmId \
                  --output tsv)"
                echo "::error::Azure stopped the playground because an App Service F1 quota was exceeded."
                az rest \
                  --method get \
                  --url "${plan_id}/usages?api-version=2022-03-01" \
                  --query "value[?limit >= \`0\` && currentValue > limit].{quota:name.localizedValue,current:currentValue,limit:limit,unit:unit,nextResetTime:nextResetTime}" \
                  --output table
                exit 1
              fi
            fi
            echo "Health attempt ${attempt} returned HTTP ${status_code}."
            sleep 10
          done
          exit 1
