name: Bug report
description: Report a reproducible defect in implemented behaviour.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: List the smallest commands, API calls, or UI actions that reproduce the problem.
      placeholder: |
        1. Seed a state with ...
        2. Submit ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include relevant error text, logs, or screenshots.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification already tried
      description: Commands, tests, or manual checks already run.
