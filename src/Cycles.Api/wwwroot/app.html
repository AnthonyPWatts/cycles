<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cycles Command</title>
    <link rel="stylesheet" href="styles.css?v=20260711-day-one-guide-2">
</head>
<body>
    <header class="topbar">
        <div>
            <a class="brand-link" href="/">Cycles</a>
            <p id="cycleStatus">Loading...</p>
        </div>
        <form id="loginForm" class="login-form">
            <input id="username" name="username" autocomplete="username" value="player-1" aria-label="Username">
            <button type="submit">Login</button>
        </form>
    </header>

    <main class="shell">
        <section id="mapPanel" class="map-panel" aria-label="Galaxy map">
            <div class="toolbar">
                <div>
                    <span class="toolbar-kicker">Command Nexus</span>
                    <strong id="empireName">Empire</strong>
                </div>
                <div class="toolbar-actions">
                    <button id="tutorialButton" type="button" aria-controls="tutorialPanel">Guide</button>
                    <button id="advanceTurnButton" type="button" title="Resolve one authoritative turn for the whole development galaxy." hidden>Advance turn</button>
                    <button id="refreshButton" type="button">Refresh</button>
                </div>
            </div>
            <p id="turnMessage" class="turn-message" role="status"></p>
            <div class="map-stage">
                <svg id="galaxyMap" viewBox="0 0 1000 700" role="img" aria-label="Systems and routes"></svg>
                <div class="map-readout" aria-label="Galaxy summary">
                    <div id="mapStats" class="map-stats"></div>
                    <div class="map-legend" aria-label="Map legend">
                        <span><i class="legend-dot legend-home"></i>Home</span>
                        <span><i class="legend-dot legend-historic"></i>Historic</span>
                        <span><i class="legend-ring"></i>Presence</span>
                        <span><i class="legend-dot legend-contested"></i>Contested</span>
                    </div>
                </div>
            </div>
        </section>

        <aside class="side-panel">
            <section id="resourcesSection" class="summary">
                <h2>Resources</h2>
                <dl id="resources"></dl>
            </section>

            <section id="systemSection">
                <h2>System</h2>
                <div id="systemDetails" class="system-details"></div>
            </section>

            <section id="prioritySection">
                <h2>Priorities</h2>
                <form id="priorityForm" class="priority-form">
                    <label>
                        Industry
                        <input id="industryWeight" type="number" min="0" max="100" step="5" inputmode="numeric">
                    </label>
                    <label>
                        Research
                        <input id="researchWeight" type="number" min="0" max="100" step="5" inputmode="numeric">
                    </label>
                    <label>
                        Military
                        <input id="militaryWeight" type="number" min="0" max="100" step="5" inputmode="numeric">
                    </label>
                    <label>
                        Expansion
                        <input id="expansionWeight" type="number" min="0" max="100" step="5" inputmode="numeric">
                    </label>
                    <div class="priority-total">Total <strong id="priorityTotal">0</strong></div>
                    <div id="priorityBars" class="priority-bars" aria-label="Priority allocation"></div>
                    <button type="submit">Save priorities</button>
                    <p id="priorityMessage" class="message" role="status"></p>
                </form>
            </section>

            <section id="fleetsSection">
                <h2>Fleets</h2>
                <div id="fleets" class="list"></div>
            </section>

            <section id="fleetSection">
                <h2>Fleet</h2>
                <div id="fleetDetails" class="fleet-details"></div>
            </section>

            <section id="ordersSection">
                <h2>Orders</h2>
                <form id="moveForm" class="order-form">
                    <label>
                        Fleet
                        <select id="fleetSelect"></select>
                    </label>
                    <label>
                        Destination
                        <select id="destinationSelect"></select>
                    </label>
                    <button type="submit">Queue move</button>
                </form>
                <form id="attackForm" class="order-form">
                    <label>
                        Attacker
                        <select id="attackFleetSelect"></select>
                    </label>
                    <label>
                        Target
                        <select id="targetEmpireSelect"></select>
                    </label>
                    <button type="submit">Queue attack</button>
                </form>
                <form id="coloniseForm" class="order-form">
                    <label>
                        Colonising fleet
                        <select id="coloniseFleetSelect"></select>
                    </label>
                    <span class="form-hint">Costs 100 population and resolves next tick.</span>
                    <button type="submit">Queue outpost</button>
                </form>
                <p id="orderMessage" class="message" role="status"></p>
            </section>

            <section id="orderQueueSection">
                <h2>Order Queue</h2>
                <div id="orders" class="list compact"></div>
            </section>

            <section id="eventsSection">
                <h2>Events</h2>
                <div id="events" class="list compact"></div>
            </section>

            <section id="chronicleSection">
                <h2>Chronicle</h2>
                <div id="chronicle" class="list compact"></div>
            </section>
        </aside>
    </main>

    <aside id="tutorialPanel" class="tutorial-panel" aria-labelledby="tutorialTitle" hidden>
        <div class="tutorial-heading-row">
            <div>
                <span class="tutorial-kicker">Day 1 guide</span>
                <span id="tutorialProgress" class="tutorial-progress"></span>
            </div>
            <button id="tutorialPauseButton" class="tutorial-pause" type="button">Pause</button>
        </div>
        <h2 id="tutorialTitle" tabindex="-1"></h2>
        <p id="tutorialBody"></p>
        <p id="tutorialRequirement" class="tutorial-requirement"></p>
        <div class="tutorial-actions">
            <button id="tutorialSkipButton" class="secondary-action" type="button">Skip guide</button>
            <span></span>
            <button id="tutorialBackButton" class="secondary-action" type="button">Back</button>
            <button id="tutorialNextButton" type="button">Next</button>
        </div>
    </aside>

    <script src="app.js?v=20260711-day-one-guide-3"></script>
</body>
</html>
