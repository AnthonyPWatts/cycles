name = "cycles-playground"
account_id = "d0933f72e3653d65c595ac6f3a30c6fd"
main = "worker.js"
compatibility_date = "2026-07-13"
workers_dev = false
preview_urls = false

[build]
command = "node build-public-assets.js"
cwd = "."
